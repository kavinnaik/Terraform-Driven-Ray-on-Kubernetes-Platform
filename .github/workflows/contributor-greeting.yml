name: Contributor Greeting

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  greet:
    name: Welcome New Contributor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v3
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          issue_message: |
            Welcome to **Terraform-Driven Ray on Kubernetes** 👋

            Thanks for opening your first issue! We appreciate your interest in the project.

            A maintainer will review this shortly. In the meantime:
            - 📖 Check the [README](https://github.com/${{ github.repository }}#readme) for setup instructions
            - 🏗️ Review the [Architecture Diagram](https://github.com/${{ github.repository }}#architecture)
            - 💬 Feel free to add more context if needed
          pr_message: |
            Welcome to **Terraform-Driven Ray on Kubernetes** 🎉

            Thanks for your first pull request! We're excited to review your contribution.

            A few things to keep in mind:
            - ✅ All CI checks must pass before merge
            - 📝 Please use [Conventional Commits](https://www.conventionalcommits.org/) for your PR title (e.g., `feat:`, `fix:`, `docs:`)
            - 📋 Make sure to add an entry in `CHANGELOG.md`

            A maintainer will review this soon. Thank you! 🙏
